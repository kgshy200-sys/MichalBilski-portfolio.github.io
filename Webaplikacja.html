<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Organizator Zadań (HTML)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4fb; }
    .users-container {
      display: flex;
      gap: 1.5rem;
    }
    .user-list {
      margin: 10px;
      padding: 10px;
      min-width: 250px;
      min-height: 100px;
      border: 2px dashed #aaa;
      border-radius: 4px;
      background: #f7f7fa;
    }
    .task {
      padding: 10px;
      margin: 5px 0;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: move;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .dragging {
      opacity: 0.5;
    }
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #44c;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .notification button {
      background: transparent;
      border: none;
      color: #eaf;
      font-weight: bold;
      font-size: 1em;
      cursor: pointer;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <h2>Organizator Zadań</h2>
  <div class="users-container" id="users"></div>
  <div id="notification" class="notification" style="display:none;">
    <span id="notif-text"></span>
    <button onclick="closeNotification()">X</button>
  </div>

  <script>
    // Dane początkowe
    let users = ["Jan", "Anna", "Kasia"];
    let tasks = [
      { id: 1, text: "Zadanie 1", user: "Jan" },
      { id: 2, text: "Zadanie 2", user: "Anna" },
      { id: 3, text: "Zadanie 3", user: "Kasia" }
    ];

    // --- Powiadomienia
    function showNotification(msg) {
      const notif = document.getElementById("notification");
      document.getElementById("notif-text").textContent = msg;
      notif.style.display = "flex";
      if (notif._timeout) clearTimeout(notif._timeout);
      notif._timeout = setTimeout(closeNotification, 2500);
    }
    function closeNotification() {
      document.getElementById("notification").style.display = "none";
    }

    // --- Renderowanie listy użytkowników i zadań
    function render() {
      const container = document.getElementById("users");
      container.innerHTML = "";
      users.forEach(user => {
        const userDiv = document.createElement("div");
        userDiv.className = "user-list";
        userDiv.dataset.user = user;
        userDiv.ondragover = (e) => { e.preventDefault(); userDiv.style.background = "#e6e6fa"; };
        userDiv.ondragleave = () => { userDiv.style.background = "#f7f7fa"; };
        userDiv.ondrop = (e) => {
          e.preventDefault();
          userDiv.style.background = "#f7f7fa";
          const taskId = +e.dataTransfer.getData("task-id");
          const task = tasks.find(t => t.id === taskId);
          if (task && task.user !== user) {
            task.user = user;
            render();
            showNotification("Zadanie przeniesione do użytkownika " + user + "!");
          }
        };

        const hdr = document.createElement("h3");
        hdr.textContent = user;
        userDiv.appendChild(hdr);

        tasks
          .filter(t => t.user === user)
          .forEach(task => {
            const taskDiv = document.createElement("div");
            taskDiv.className = "task";
            taskDiv.draggable = true;
            taskDiv.textContent = task.text + " ";
            const span = document.createElement("span");
            span.style.color = "#888";
            span.textContent = `(${task.user})`;
            taskDiv.appendChild(span);

            taskDiv.ondragstart = (e) => {
              e.dataTransfer.setData("task-id", task.id);
              setTimeout(() => { taskDiv.classList.add("dragging"); }, 0);
            };
            taskDiv.ondragend = () => {
              taskDiv.classList.remove("dragging");
            };

            userDiv.appendChild(taskDiv);
          });

        container.appendChild(userDiv);
      });
    }

    render();

  </script>

</body>
</html>
